<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Application Submitted | Kasi2Campus</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: "Segoe UI", Arial, sans-serif;
}

body{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:#333;
}

.card{
background:white;
padding:50px;
border-radius:14px;
text-align:center;
max-width:520px;
width:90%;
box-shadow:0 20px 50px rgba(0,0,0,0.25);
animation:fadeIn 0.8s ease;
}

.logo{
width:90px;
margin-bottom:15px;
}

h1{
color:#009688;
margin-top:15px;
font-size:28px;
}

p{
margin-top:15px;
font-size:16px;
line-height:1.6;
color:#555;
}

.btn{
margin-top:30px;
display:inline-block;
background:#ff6b00;
color:white;
padding:14px 28px;
text-decoration:none;
border-radius:6px;
font-weight:bold;
transition:0.3s;
}

.btn:hover{
background:#e65c00;
transform:translateY(-2px);
}

/* CHECKMARK ANIMATION */

.checkmark-circle{
width:110px;
height:110px;
position:relative;
display:inline-block;
vertical-align:top;
}

.checkmark-circle .background{
width:110px;
height:110px;
border-radius:50%;
background:#009688;
position:absolute;
}

.checkmark{
border-radius:5px;
}

.checkmark.draw:after{
animation-delay:300ms;
animation-duration:1s;
animation-timing-function:ease;
animation-name:checkmark;
transform:scaleX(-1) rotate(135deg);
animation-fill-mode:forwards;
}

.checkmark:after{
opacity:0;
height:55px;
width:25px;
transform-origin:left top;
border-right:8px solid white;
border-top:8px solid white;
border-radius:3px !important;
content:'';
left:28px;
top:55px;
position:absolute;
}

@keyframes checkmark{
0%{
height:0;
width:0;
opacity:1;
}
20%{
height:0;
width:25px;
opacity:1;
}
40%{
height:55px;
width:25px;
opacity:1;
}
100%{
height:55px;
width:25px;
opacity:1;
}
}

@keyframes fadeIn{
from{opacity:0; transform:translateY(15px);}
to{opacity:1; transform:translateY(0);}
}

</style>
</head>

<body>

<div class="card">

<img src="assets/logo.png" class="logo">

<div class="checkmark-circle">
<div class="background"></div>
<div class="checkmark draw"></div>
</div>

<h1>Application Submitted Successfully</h1>

<p>
Thank you for applying through <strong>Kasi2Campus</strong>.
Your application has been received and will now be processed.
</p>

<p>
We will contact you if any additional information is required.
</p>

<a class="btn" href="index.html">Return to Homepage</a>

</div>

</body>

</html>
