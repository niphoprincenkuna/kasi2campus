<!DOCTYPE html>
<html>
<head>
  <title>Kasi2Campus - Sign Up</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div class="login-box">
    <img src="assets/logo.png" alt="Kasi2Campus">
    <h1>Create Your Account</h1>
    <input type="text" id="full-name" placeholder="Full name">
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password (min 6 characters)">
    <input type="password" id="confirm-password" placeholder="Confirm password">
    <button id="signup-btn">Sign Up</button>
    <p id="error-msg"></p>
    <p style="margin-top: 14px; font-size: 13px;">
      Already have an account? <a href="index.html" style="color: var(--k2c-blue);">Log in</a>
    </p>
  </div>

  <script type="module" src="js/signup.js"></script>
</body>
</html>
