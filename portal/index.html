<!DOCTYPE html>
<html>
<head>
  <title>Kasi2Campus - Student Portal</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-page">

  <div class="login-box">
    <h1>Student Portal</h1>
    <p class="subtitle">Sign in to continue</p>
    <div class="accent-line"></div>

    <label for="email">Email Address</label>
    <input type="email" id="email" placeholder="Enter your email">

    <label for="password">Password</label>
    <div class="password-wrapper">
      <input type="password" id="password" placeholder="Enter your password">
      <button type="button" id="toggle-password" aria-label="Show password">👁</button>
    </div>

    <div class="row-between">
      <label class="remember-me">
        <input type="checkbox" id="remember-me">
        Remember me
      </label>
      <a href="#" id="forgot-password-link">Forgot password?</a>
    </div>

    <button id="login-btn">Sign In</button>

    <p id="error-msg"></p>

    <div class="divider"><span>or</span></div>

    <a href="signup.html" class="create-account-btn">
      <span class="person-icon">&#128100;</span> Create an Account
    </a>

    <p class="footer-note">© 2026 Kasi2Campus. All rights reserved.</p>
  </div>

  <script type="module" src="js/login.js"></script>
</body>
</html>
