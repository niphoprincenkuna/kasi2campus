<!DOCTYPE html>
<html>
<head>
  <title>Kasi2Campus - Login</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div class="login-box">
    <img src="assets/logo.png" alt="Kasi2Campus">
    <h1>Learner Portal Login</h1>
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">
    <button id="login-btn">Log In</button>
    <p id="error-msg"></p>
    <p id="error-msg"></p>
    <p style="margin-top: 14px; font-size: 13px;">
      Don't have an account? <a href="signup.html" style="color: var(--k2c-blue);">Sign up</a>
    </p>
     <p style="margin-top: 8px; font-size: 13px;">
      <a href="#" id="forgot-password-link" style="color: var(--k2c-blue);">Forgot password?</a>
    </p>
  </div>

  <script type="module" src="js/login.js"></script>
</body>
</html>
